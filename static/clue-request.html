<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Clue - Riddle</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="nav">
        <a class="nav-brand" href="/dashboard.html">Riddle</a>
        <div class="nav-right">
            <a href="/dashboard.html">Menu</a>
            <a href="/clues.html">My Clues</a>
            <span class="nav-user" id="nav-username"></span>
            <a href="#" id="logout-link">Log out</a>
        </div>
    </nav>
    <div class="container container--wide">
        <h1>Request a Clue</h1>
        <div class="card">
            <form id="clue-form">
                <div class="form-group">
                    <label for="page">Page (0 - 203)</label>
                    <input type="number" id="page" name="page" required min="0" max="203" value="0">
                </div>
                <div class="form-group">
                    <label for="level">Level (0 - 9)</label>
                    <input type="number" id="level" name="level" required min="0" max="9" value="0">
                </div>
                <div class="form-group">
                    <label for="description">Description (optional)</label>
                    <textarea id="description" name="description" placeholder="What are you stuck on?"></textarea>
                </div>
                <button type="submit">Submit Request</button>
            </form>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script>
        requireAuth();

        whoami().then(function (data) {
            document.getElementById("nav-username").textContent = data.username;
        }).catch(function () {
            clearToken();
            window.location.href = "/login.html";
        });

        document.getElementById("logout-link").addEventListener("click", async function (e) {
            e.preventDefault();
            try {
                await logout();
            } catch (err) { /* ignore */ }
            window.location.href = "/";
        });

        document.getElementById("clue-form").addEventListener("submit", async function (e) {
            e.preventDefault();
            var btn = this.querySelector("button");
            btn.disabled = true;
            try {
                await requestClue(
                    parseInt(document.getElementById("page").value, 10),
                    parseInt(document.getElementById("level").value, 10),
                    document.getElementById("description").value.trim()
                );
                toastSuccess("Clue request submitted!");
                document.getElementById("description").value = "";
            } catch (err) {
                toastError(err.message);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
