<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Riddle</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Sign Up</h1>
        <div class="card">
            <form id="register-form">
                <div class="form-group">
                    <label for="username">Username (letters and digits, 4-32 chars)</label>
                    <input type="text" id="username" name="username" required minlength="4" maxlength="32" pattern="[A-Za-z0-9]+">
                </div>
                <div class="form-group">
                    <label for="password">Password (min 8 chars)</label>
                    <input type="password" id="password" name="password" required minlength="8">
                </div>
                <button type="submit">Sign Up</button>
            </form>
        </div>
        <div class="links">
            <a href="/login.html">Already have an account</a>
            <a href="/">Home</a>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script>
        requireGuest();
        document.getElementById("register-form").addEventListener("submit", async function (e) {
            e.preventDefault();
            var btn = this.querySelector("button");
            btn.disabled = true;
            try {
                await register(
                    document.getElementById("username").value.trim(),
                    document.getElementById("password").value
                );
                toastSuccess("Account created. Wait for approval, then log in.");
            } catch (err) {
                toastError(err.message);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
