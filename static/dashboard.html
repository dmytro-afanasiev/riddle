<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riddle</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { overflow-x: hidden; }
        .page {
            margin: 0 auto auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 7vh 1rem 0;
            width: 100%;
        }
        .title-wrap {
            position: relative;
            display: inline-block;
            /* one knob scales the whole title block; shrinks to fit narrow screens */
            font-size: clamp(2rem, 9vw, 4rem);
        }
        .title-wrap h1 {
            color: #f0f0f0;
            font-size: 1em;
            white-space: nowrap;
            margin: 0;
        }
        .splash-wrap {
            position: absolute;
            left: 100%;
            /* anchor = FIRST line; extra lines extend downward from here */
            top: 0.9em;
            margin-left: -1.25em;
            width: min(220px, 42vw);
            text-align: left;
        }
        .splash {
            display: block;
            color: #ffd83f;
            font-size: max(0.85rem, 0.26em);
            font-style: italic;
            line-height: 1.4;
            text-shadow:
                1px 1px 0 #000, -1px 1px 0 #000,
                1px -1px 0 #000, -1px -1px 0 #000,
                0 2px 3px rgba(0, 0, 0, 0.8);
            transform-origin: left top;
            animation: pump 0.9s ease-in-out infinite;
        }
        @keyframes pump {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            50%      { transform: rotate(-10deg) scale(1.07); }
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 3rem;
            width: 100%;
            max-width: 420px;
        }
        .menu a {
            text-align: center;
            padding: 0.9rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="nav-brand">Riddle</span>
        <div class="nav-right">
            <span class="nav-user" id="nav-username"></span>
            <a href="#" id="logout-link">Log out</a>
        </div>
    </nav>
    <div class="page">
        <div class="title-wrap">
            <h1>Welkome to the game</h1>
            <span class="splash-wrap"><span class="splash" id="splash"></span></span>
        </div>
        <div class="menu">
            <a href="/felina.html" class="btn-outline">Submit Felina Phrase</a>
            <a href="/clue-request.html" class="btn-outline">Request a clue</a>
            <a href="/clues.html" class="btn-outline">My clues</a>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script>
        requireAuth();

        whoami().then(function (data) {
            document.getElementById("nav-username").textContent = data.username;
        }).catch(function () {
            clearToken();
            window.location.href = "/login.html";
        });

        getRandomClue().then(function (msg) {
            if (msg) document.getElementById("splash").textContent = msg;
        }).catch(function () { /* ignore */ });

        document.getElementById("logout-link").addEventListener("click", async function (e) {
            e.preventDefault();
            try { await logout(); } catch (err) { /* ignore */ }
            window.location.href = "/";
        });
    </script>
</body>
</html>
